---
grails:
    profile: web
    codegen:
        defaultPackage: zelifkudos
    gorm:
        reactor:
            # Whether to translate GORM events into Reactor events
            # Disabled by default for performance reasons
            events: false
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
server:
    servlet:
        session:
            timeout: 30d
            cookie:
                max-age: 2592000
spring:
    session:
        store-type: jdbc
        jdbc:
            initialize-schema: never
    jmx:
        unique-names: true
    main:
        banner-mode: "off"
    mail:
        host: ${SMTP_HOST:}
        port: ${SMTP_PORT:}
        username: ${SMTP_USERNAME:}
        password: ${SMTP_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
    groovy:
        template:
            check-template-location: false
    devtools:
        restart:
            additional-exclude:
                - '*.gsp'
                - '**/*.gsp'
                - '*.gson'
                - '**/*.gson'
                - 'logback-spring.xml'
                - '*.properties'
environments:
    development:
        management:
            endpoints:
                enabled-by-default: true
                web:
                    base-path: '/actuator'
                    exposure:
                        include: '*'
    production:
        spring:
            session:
                jdbc:
                    initialize-schema: never
        management:
            endpoints:
                enabled-by-default: false

---
grails:
    mime:
        disable:
            accept:
                header:
                    userAgents:
                        - Gecko
                        - WebKit
                        - Presto
                        - Trident
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
              - text/html
              - application/xhtml+xml
            js: text/javascript
            json:
              - application/json
              - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
              - application/hal+json
              - application/hal+xml
            xml:
              - text/xml
              - application/xml
    urlmapping:
        cache:
            maxsize: 1000
    controllers:
        defaultScope: singleton
    converters:
        encoding: UTF-8
    views:
        default:
            codec: html
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                expression: html
                scriptlet: html
                taglib: none
                staticparts: none

---
hibernate:
    cache:
        queries: false
        use_second_level_cache: false
        use_query_cache: false
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.postgresql.Driver
    dialect: org.hibernate.dialect.PostgreSQLDialect
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}

environments:
    development:
        dataSource:
            dbCreate: update
            url: jdbc:postgresql://localhost:5432/zelifkudos
    test:
        dataSource:
            dbCreate: update
            url: jdbc:postgresql://localhost:5432/zelifkudos
    production:
        dataSource:
            dbCreate: none
            url: ${DB_URL:jdbc:postgresql://localhost:5432/zelifkudos}

spring:
    liquibase:
        change-log: classpath:db/changelog/changelog-master.yaml
