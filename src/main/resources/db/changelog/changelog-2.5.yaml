databaseChangeLog:
  - changeSet:
      id: 2.5-0-create-hibernate-sequence
      author: seah
      preConditions:
        - onFail: MARK_RAN
        - not:
            - sequenceExists:
                sequenceName: hibernate_sequence
      changes:
        - createSequence:
            sequenceName: hibernate_sequence
            startValue: 1
            incrementBy: 1

  - changeSet:
      id: 2.5-1-create-chat-message
      author: seah
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: chat_message
      changes:
        - createTable:
            tableName: chat_message
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
              - column:
                  name: date_created
                  type: TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 2.5-2-create-feeling
      author: seah
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: feeling
      changes:
        - createTable:
            tableName: feeling
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: date_created
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: feeling
            columnNames: user_id
            constraintName: uk_feeling_user
        - addForeignKeyConstraint:
            baseTableName: feeling
            baseColumnNames: user_id
            referencedTableName: "user"
            referencedColumnNames: id
            constraintName: fk_feeling_user
